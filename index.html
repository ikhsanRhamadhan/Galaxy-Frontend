<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Login — PT Galaxy Multi Trans</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/png" href="../image/logo1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<style>
  /* ===== LOADER ===== */
  .loader-overlay {
    position: fixed;
    inset: 0;
    background-color: rgba(10, 37, 64, 0.75);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: white;
    font-family: 'DM Sans', sans-serif;
    gap: 1rem;
  }
  .loader-overlay.show {
    display: flex;
  }
  .loader-overlay p {
    font-size: 0.9rem;
    opacity: 0.85;
  }

  /* ===== FIX MOBILE LOGIN OVERFLOW ===== */
  /* Pastikan tombol login selalu terlihat di semua ukuran layar */
  @media (max-width: 768px) {
    .login-body {
      /* Izinkan scroll jika konten melebihi layar */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      align-items: flex-start;
    }
    /* Wrapper tidak boleh meluap dari layar */
    .login-wrapper {
      margin: 1rem auto;
    }
  }

  /* Khusus layar sangat pendek (landscape mobile) */
  @media (max-height: 600px) and (max-width: 768px) {
    .login-left {
      padding: 1rem 1.25rem !important;
      min-height: unset !important;
    }
    .login-brand h1 {
      font-size: 1.4rem !important;
      padding-top: 0 !important;
    }
    .login-brand p {
      display: none;
    }
  }
</style>
</head>
<body class="login-body">

<!-- Loader overlay -->
<div id="loaderOverlay" class="loader-overlay">
  <div class="spinner"></div>
  <p>Memvalidasi & Memuat Data...</p>
</div>

<div class="login-wrapper">

  <!-- Sisi kiri: branding -->
  <div class="login-left" data-aos="fade-right" data-aos-duration="1000">
    <div class="login-brand">
      <h1 data-aos="zoom-out" data-aos-delay="300" data-aos-duration="800">
        Galaxy<br><span>MultiTrans</span>
      </h1>
      <p data-aos="fade-up" data-aos-delay="600" data-aos-duration="800">
        Sistem Manajemen Pengiriman & Invoice Otomatis
      </p>
    </div>
    <!-- Dekorasi: disembunyikan di mobile via CSS -->
    <div class="login-decoration">
      <div class="deco-circle c1" data-aos="zoom-in" data-aos-delay="400"></div>
      <div class="deco-circle c2" data-aos="zoom-in" data-aos-delay="600"></div>
      <div class="deco-circle c3" data-aos="zoom-in" data-aos-delay="800"></div>
      <div class="deco-grid" data-aos="fade" data-aos-delay="500"></div>
    </div>
  </div>

  <!-- Sisi kanan: form login -->
  <div class="login-right" data-aos="fade-left" data-aos-duration="1000">
    <div class="login-box" data-aos="fade-up" data-aos-delay="200" data-aos-duration="800">

      <div class="login-header">
        <h2>Selamat Datang</h2>
        <p>Masuk ke sistem manajemen Anda</p>
      </div>

      <form id="loginForm" class="login-form" novalidate>

        <div class="form-group" data-aos="fade-up" data-aos-delay="400" data-aos-duration="600">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">⊙</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Masukkan username"
              autocomplete="username"
              autocapitalize="none"
              required
            >
          </div>
        </div>

        <div class="form-group" data-aos="fade-up" data-aos-delay="550" data-aos-duration="600">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">◈</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Masukkan password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Tampilkan/sembunyikan password">
              👁
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div id="loginError" class="alert alert-error" style="display:none" role="alert"></div>

        <!-- Tombol submit -->
        <button
          type="submit"
          class="btn-login"
          id="loginBtn"
          data-aos="fade-up"
          data-aos-delay="700"
          data-aos-duration="600"
        >
          <span>Masuk</span>
          <span class="btn-arrow">→</span>
        </button>

      </form>

      <div class="login-hint">
        <p>Hubungi administrator jika Anda lupa password</p>
      </div>

    </div>
  </div>

</div><!-- /.login-wrapper -->

<script src="js/api.js"></script>
<script>
  // ===== Login Form =====
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn     = document.getElementById('loginBtn');
    const err     = document.getElementById('loginError');
    const loader  = document.getElementById('loaderOverlay');

    // Reset state
    err.style.display = 'none';
    btn.classList.add('loading');
    btn.disabled = true;
    loader.classList.add('show');

    try {
      const res = await API.login(
        document.getElementById('username').value.trim(),
        document.getElementById('password').value
      );
      localStorage.setItem('token', res.token);
      localStorage.setItem('user', JSON.stringify(res.user));
      window.location.href = 'pages/dashboard.html';
    } catch (ex) {
      err.textContent = ex.message || 'Login gagal. Periksa username dan password.';
      err.style.display = 'block';
      loader.classList.remove('show');
      // Scroll ke pesan error agar terlihat di mobile
      err.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });

  // ===== Toggle password visibility =====
  function togglePw() {
    const pw   = document.getElementById('password');
    const icon = document.querySelector('.toggle-pw');
    if (pw.type === 'password') {
      pw.type  = 'text';
      icon.textContent = '🙈';
    } else {
      pw.type  = 'password';
      icon.textContent = '👁';
    }
  }

  // ===== AOS init =====
  AOS.init({
    once: true,
    easing: 'ease-in-out',
    // Matikan AOS di mobile agar tidak ganggu layout
    disable: window.innerWidth < 768 ? true : false
  });
</script>
</body>
</html>
